name: Bug Report
description: Report a script failure or build issue
labels: [bug]
body:
  - type: input
    id: script
    attributes:
      label: Which script?
      placeholder: "build-meetings.mjs"
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message
      render: shell
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v22.0.0"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Steps to reproduce, OS, or anything else relevant
