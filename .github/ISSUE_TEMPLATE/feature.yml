name: Feature Request
description: Suggest a new data source, pipeline improvement, or UI enhancement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature and why it would be useful
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Suggested approach
      description: How might this be implemented? (optional)
